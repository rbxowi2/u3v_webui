<!-- lenscalibrate/ui.html — LensCalibrate plugin (2.3.0) -->
<div class="collapsible-hdr" onclick="var b=this.nextElementSibling,o=b.classList.toggle('is-open');this.querySelector('.collapse-arrow').textContent=o?'&#9660;':'&#9654;'">
  <span class="collapse-arrow">&#9654;</span>
  <span>Lens Calibrate</span>
</div>
<div class="collapsible-body">
  <div style="padding:8px 12px;display:flex;flex-direction:column;gap:8px;">

    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;color:#aaa;flex:1;">Lens Type</label>
      <select class="calib-lens-type" onchange="calibOnLensType(this)"
              style="background:#2a2a2a;color:#d4d4d4;border:1px solid #444;border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer;">
        <option value="normal">Normal</option>
        <option value="fisheye">Fisheye</option>
      </select>
    </div>

    <div style="display:flex;align-items:center;gap:4px;">
      <span style="font-size:11px;color:#aaa;flex:1;">Board corners</span>
      <input type="number" class="calib-board-cols" value="9" min="3" max="20"
             onchange="calibOnBoardCols(this)"
             style="width:44px;background:#2a2a2a;color:#d4d4d4;border:1px solid #444;border-radius:3px;padding:3px 4px;font-size:11px;text-align:center;">
      <span style="font-size:11px;color:#555;">&#215;</span>
      <input type="number" class="calib-board-rows" value="6" min="3" max="20"
             onchange="calibOnBoardRows(this)"
             style="width:44px;background:#2a2a2a;color:#d4d4d4;border:1px solid #444;border-radius:3px;padding:3px 4px;font-size:11px;text-align:center;">
    </div>

    <div style="display:flex;align-items:center;gap:6px;">
      <span style="font-size:11px;color:#aaa;flex:1;">Square (mm)</span>
      <input type="number" class="calib-square-size" value="25" min="1" max="500" step="0.5"
             onchange="calibOnSquareSize(this)"
             style="width:60px;background:#2a2a2a;color:#d4d4d4;border:1px solid #444;border-radius:3px;padding:3px 4px;font-size:11px;text-align:center;">
    </div>

    <div class="calib-info-row" style="font-size:10px;color:#666;min-height:14px;line-height:1.5;"></div>

    <button class="btn calib-btn-open" onclick="calibOpenModal(this)"
            style="background:#1a3a5c;color:#6ab0d4;border:1px solid #2a5a8c;font-weight:600;">
      Calibrate
    </button>

  </div>
</div>
