<!-- bufrecord/ui.html — RAM-buffer recording (1.0.0)
     Multi-camera safe: NO fixed IDs. All elements use data-id attributes.
     JS queries are scoped to the nearest .plugin-ui-block ancestor. -->
<div class="collapsible-hdr" onclick="var b=this.nextElementSibling,o=b.classList.toggle('is-open');this.querySelector('.collapse-arrow').textContent=o?'\u25bc':'\u25b6'">
  <span class="collapse-arrow">&#9654;</span>
  <span>Buffer Rec</span>
</div>
<div class="collapsible-body">
  <div class="fmt-row">
    <span style="color:#888;font-size:11px;">Format:</span>
    <label><input type="radio" name="buf_fmt" value="BMP" checked onchange="bufOnFmt(this)"> BMP (Lossless)</label>
    <label><input type="radio" name="buf_fmt" value="JPG"       onchange="bufOnFmt(this)"> JPG (Q85)</label>
  </div>
  <button class="btn btn-purple" data-id="btn-buf" onclick="bufToggleBuf(this)">Buffer Rec (RAM)</button>
  <div class="divider"></div>
</div>
