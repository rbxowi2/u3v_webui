<!-- record/ui.html — Continuous recording (1.0.0)
     Multi-camera safe: NO fixed IDs. All elements use data-id attributes.
     JS queries are scoped to the nearest .plugin-ui-block ancestor. -->
<div class="collapsible-hdr" onclick="var b=this.nextElementSibling,o=b.classList.toggle('is-open');this.querySelector('.collapse-arrow').textContent=o?'\u25bc':'\u25b6'">
  <span class="collapse-arrow">&#9654;</span>
  <span>Record</span>
</div>
<div class="collapsible-body">
  <div class="fmt-row">
    <span style="color:#888;font-size:11px;">Format:</span>
    <label><input type="radio" name="rec_fmt" value="BMP" checked onchange="recOnFmt(this)"> BMP (Lossless)</label>
    <label><input type="radio" name="rec_fmt" value="JPG"       onchange="recOnFmt(this)"> JPG (Q85)</label>
  </div>
  <!-- Audio row (shown only when camera reports audio hardware) -->
  <div data-id="audio-row" class="check-row" style="display:none;">
    <input type="checkbox" data-id="chk-audio" onchange="recOnAudio(this)">
    <label>Record Audio</label>
  </div>
  <button class="btn btn-red" data-id="btn-record" onclick="recToggleRecord(this)">Record</button>
  <div class="divider"></div>
</div>
