<!-- overlaytext/ui.html — injected into #sidebar by syncPluginArea -->
<div class="collapsible-hdr" onclick="var b=this.nextElementSibling,o=b.classList.toggle('is-open');this.querySelector('.collapse-arrow').textContent=o?'\u25bc':'\u25b6'">
  <span class="collapse-arrow">&#9654;</span>
  <span>Overlay Text</span>
</div>
<div class="collapsible-body">
  <div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px;">
    <textarea class="overlaytext-input" rows="3"
      placeholder="Enter text to display on frame..."
      style="width:100%;box-sizing:border-box;resize:vertical;font-size:12px;padding:4px 6px;background:#2d2d2d;color:#d4d4d4;border:1px solid #555;border-radius:3px;outline:none;"
      oninput="overlayTextOnInput(this)"></textarea>

    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;color:#aaa;white-space:nowrap;">Color</label>
      <input type="color" class="overlaytext-color" value="#ffffff"
        style="width:36px;height:22px;border:none;padding:0;background:none;cursor:pointer;"
        oninput="overlayTextOnColor(this)">
      <label style="font-size:11px;color:#aaa;white-space:nowrap;">Size</label>
      <input type="range" class="overlaytext-scale" min="0" max="5" step="0.1" value="0"
        style="flex:1;min-width:0;"
        oninput="overlayTextOnScale(this)">
      <span class="overlaytext-scale-label" style="font-size:11px;color:#aaa;min-width:28px;text-align:right;">Auto</span>
    </div>

    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;color:#aaa;white-space:nowrap;">Position</label>
      <select class="overlaytext-pos"
        style="flex:1;font-size:12px;padding:2px 4px;background:#2d2d2d;color:#d4d4d4;border:1px solid #555;border-radius:3px;outline:none;"
        onchange="overlayTextOnPos(this)">
        <option value="center">Center</option>
        <option value="top-left">Top Left</option>
        <option value="top-center">Top Center</option>
        <option value="top-right">Top Right</option>
        <option value="bottom-left">Bottom Left</option>
        <option value="bottom-center">Bottom Center</option>
        <option value="bottom-right">Bottom Right</option>
      </select>
    </div>

    <button class="btn btn-gray" onclick="overlayTextClear(this)">Clear</button>
  </div>
</div>
