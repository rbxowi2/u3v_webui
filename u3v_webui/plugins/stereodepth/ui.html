<!-- stereodepth/ui.html — StereoDepth plugin (1.0.0) -->
<div class="collapsible-hdr" onclick="var b=this.nextElementSibling,o=b.classList.toggle('is-open');this.querySelector('.collapse-arrow').textContent=o?'&#9660;':'&#9654;'">
  <span class="collapse-arrow">&#9654;</span>
  <span>Stereo Depth</span>
</div>
<div class="collapsible-body">
  <div style="padding:8px 12px;display:flex;flex-direction:column;gap:8px;">

    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;color:#aaa;flex:1;">Left camera</label>
      <select class="depth-cam-left" onchange="depthOnCamLeft(this)"
              style="background:#2a2a2a;color:#d4d4d4;border:1px solid #444;border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer;max-width:160px;"></select>
    </div>

    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;color:#aaa;flex:1;">Right camera</label>
      <select class="depth-cam-right" onchange="depthOnCamRight(this)"
              style="background:#2a2a2a;color:#d4d4d4;border:1px solid #444;border-radius:3px;padding:3px 8px;font-size:11px;cursor:pointer;max-width:160px;"></select>
    </div>

    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;color:#aaa;flex:1;">Display on</label>
      <div style="display:flex;gap:4px;">
        <button class="btn depth-side-L" onclick="depthSetSide(this,'L')"
                style="font-size:11px;padding:2px 10px;border-radius:3px;cursor:pointer;">L</button>
        <button class="btn depth-side-R" onclick="depthSetSide(this,'R')"
                style="font-size:11px;padding:2px 10px;border-radius:3px;cursor:pointer;">R</button>
      </div>
    </div>

    <div class="depth-info-row" style="font-size:10px;color:#666;min-height:14px;line-height:1.5;"></div>

    <div style="display:flex;gap:6px;">
      <button class="btn depth-btn-enable" onclick="depthToggleEnable(this)"
              style="flex:1;font-size:12px;font-weight:600;">Enable</button>
      <button class="btn depth-btn-open" onclick="depthOpenModal(this)"
              style="flex:1;background:#1a3a5c;color:#6ab0d4;border:1px solid #2a5a8c;font-size:12px;">Setting</button>
    </div>

    <button class="btn depth-btn-save-ply" onclick="depthSavePly(this)"
            style="font-size:12px;background:#1a2a3a;color:#5a90c0;border:1px solid #2a5a8c;display:none;">Save PLY</button>

  </div>
</div>
