<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>U3V WebUI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 頂部標題列 ─────────────────────────────────────────────────────────── */
  #header-bar {
    background: #252526;
    border-bottom: 1px solid #3a3a3a;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #header-title {
    font-size: 13px;
    color: #d4d4d4;
    font-weight: 600;
  }
  #header-title span {
    color: #555;
    font-size: 10px;
    font-weight: normal;
    margin-left: 4px;
  }
  #header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: #888;
  }
  #viewer-count { color: #3a7bd5; font-weight: bold; }

  /* ── 影像區 ──────────────────────────────────────────────────────────────── */
  #video-panel {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  #stream-img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }
  #placeholder { color: #555; font-size: 18px; }
  #rec-badge {
    display: none;
    position: absolute;
    top: 12px; left: 12px;
    background: #c0392b;
    color: white;
    font-size: 13px;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 4px;
  }

  /* ── 登出按鈕 ────────────────────────────────────────────────────────────── */
  .btn-logout {
    background: transparent;
    border: 1px solid #444;
    color: #888;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-logout:hover { opacity: 0.7; }
</style>
</head>
<body>

<!-- Header -->
<div id="header-bar">
  <div id="header-title">
    U3V WebUI <span>v{{ version }}</span>
  </div>
  <div id="header-right">
    Viewers: <span id="viewer-count">—</span>
    <button class="btn-logout" onclick="location.href='/logout'">Logout</button>
  </div>
</div>

<!-- Video panel -->
<div id="video-panel">
  <div id="placeholder">Waiting for camera...</div>
  <img id="stream-img" style="display:none;" alt="stream">
  <div id="rec-badge">⏺ REC</div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const _token = "{{ token }}";
const socket = io({ query: { token: _token } });

socket.on("viewer_count", (n) => {
  document.getElementById("viewer-count").textContent = n;
});

socket.on("frame", (data) => {
  const img = document.getElementById("stream-img");
  img.src = "data:image/jpeg;base64," + data.img;
  img.style.display = "block";
  document.getElementById("placeholder").style.display = "none";
  document.getElementById("rec-badge").style.display =
    (data.recording || data.buf_rec) ? "block" : "none";
});

socket.on("state", (s) => {
  document.getElementById("viewer-count").textContent = s.viewer_count;
  const anyCamOpen = s.cameras && Object.keys(s.cameras).length > 0;
  if (!anyCamOpen) {
    document.getElementById("stream-img").style.display = "none";
    document.getElementById("placeholder").style.display = "block";
    document.getElementById("rec-badge").style.display = "none";
  }
});
</script>
</body>
</html>
