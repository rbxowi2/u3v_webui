<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1e1e1e;
    color: #d4d4d4;
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #252526;
    border-radius: 8px;
    padding: 40px 36px;
    width: 320px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  label {
    display: block;
    font-size: 12px;
    color: #888;
    margin-bottom: 6px;
  }
  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 9px 12px;
    background: #3a3a3a;
    border: 1px solid #444;
    border-radius: 4px;
    color: #d4d4d4;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #3a7bd5; }
  button {
    width: 100%;
    padding: 10px;
    background: #3a7bd5;
    color: white;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
    margin-top: 4px;
    transition: background 0.2s;
  }
  button:hover { background: #2e63b0; }
  button:disabled { background: #555; cursor: not-allowed; }

  /* Error modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    align-items: center;
    justify-content: center;
    z-index: 999;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: #252526;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 32px 28px;
    width: 300px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.7);
  }
  .modal-box .icon { font-size: 32px; margin-bottom: 12px; }
  .modal-box .title { font-size: 15px; font-weight: 600; color: #e07070; margin-bottom: 8px; }
  .modal-box .msg { font-size: 13px; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
  .modal-box button { margin-top: 0; }
</style>
</head>
<body>
<div class="card">
  <form id="loginForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" autofocus>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password">
    <button type="submit" id="loginBtn">Login</button>
  </form>
</div>

<!-- Error modal -->
<div class="modal-overlay" id="errorModal">
  <div class="modal-box">
    <div class="icon">&#9888;</div>
    <div class="title">Login Failed</div>
    <div class="msg" id="errorMsg"></div>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
  const form = document.getElementById("loginForm");
  const btn  = document.getElementById("loginBtn");

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = "Logging in...";

    const data = new FormData(form);
    try {
      const resp = await fetch("/login", { method: "POST", body: data });
      const json = await resp.json();
      if (json.ok) {
        window.location.href = json.redirect;
        return;
      }
      showModal(json.error || "Login failed.");
    } catch (err) {
      showModal("Network error. Please try again.");
    }
    btn.disabled = false;
    btn.textContent = "Login";
  });

  function showModal(msg) {
    document.getElementById("errorMsg").textContent = msg;
    document.getElementById("errorModal").classList.add("active");
  }

  function closeModal() {
    document.getElementById("errorModal").classList.remove("active");
    // Clear password field after error
    form.querySelector("input[name='password']").value = "";
    form.querySelector("input[name='username']").focus();
  }
</script>
</body>
</html>
